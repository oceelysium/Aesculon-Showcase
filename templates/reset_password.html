{% extends "base.html" %}

{% block content %}
<section class="hero hero--compact">
  <div>
    <p class="eyebrow">Account recovery</p>
    <h1>Reset your password</h1>
    <p class="hero-copy">Choose a new password for your Aesculon account. Reset links expire after a short window and stop working after the password changes.</p>
  </div>
</section>

<section class="panel reset-panel">
  <form class="auth-form reset-form" data-reset-form>
    <input type="hidden" name="token" value="{{ reset_token }}">
    <label>
      <span>New password</span>
      <input name="password" type="password" minlength="8" maxlength="128" autocomplete="new-password" placeholder="At least 8 characters" required>
    </label>
    <label>
      <span>Confirm password</span>
      <input name="confirm_password" type="password" minlength="8" maxlength="128" autocomplete="new-password" placeholder="Repeat the password" required>
    </label>
    <p class="form-error hidden" data-reset-error></p>
    <p class="form-note hidden" data-reset-note></p>
    <button class="ghost-btn" type="submit">Set new password</button>
  </form>
</section>
{% endblock %}
